<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game 🎮</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.card {
    max-width: 550px;
    width: 100%;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    color: white;
    text-align: center;
}

/* Inputs */
input, select {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

/* Buttons */
button {
    width: 90%;
    padding: 12px;
    margin: 8px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg,#43e97b,#38f9d7);
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#restartBtn {
    display:none;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color: white;
}

#options button {
    width: 100%;
}

/* Status */
.status {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 14px;
}

/* Canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Evolution of Computers Quiz</h2>

<!-- START -->
<div id="startScreen">
<input type="text" id="username" placeholder="Enter your name">

<select id="level">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="startGame()">▶️ Start Quiz</button>
</div>

<!-- QUIZ -->
<div id="quizBox" style="display:none;">
<div class="status">
<span id="timer"></span>
<span id="progress"></span>
</div>

<h3 id="question"></h3>
<div id="options"></div>

<h3 id="score"></h3>

🔊 Volume:
<input type="range" min="0" max="1" step="0.1" value="1" id="volume">

<button id="restartBtn" onclick="restartQuiz()">🔄 Restart</button>
</div>

</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>
<canvas id="confetti"></canvas>

<script>

// QUESTIONS
let allQuestions = {

easy: [
{q:"Which was the first calculating device used by humans?", options:["Laptop","Abacus","Phone","Tablet"], answer:1},
{q:"What does an abacus mainly consist of?", options:["Beads","Screen","Battery","Wire"], answer:0},
{q:"What is the upper part of an abacus called?", options:["Heaven","Earth","Top","Sky"], answer:0},
{q:"What is the lower part of an abacus called?", options:["Heaven","Earth","Bottom","Ground"], answer:1},
{q:"What does a computer store?", options:["Food","Water","Data","Air"], answer:2},
{q:"On what does a computer primarily work?", options:["Electricity","Water","Air","Magic"], answer:0},
{q:"In which places are computers commonly used?", options:["Hospitals","Banks","Schools","All of these"], answer:3},
{q:"Dust and liquids are considered what for a computer?", options:["Friends","Enemies","Tools","Devices"], answer:1},
{q:"What did people use for counting in early times?", options:["Stones","Apps","Phones","TV"], answer:0},
{q:"Which is the fastest device among the following?", options:["Computer","Human","Abacus","Stone"], answer:0}
],

medium: [
{q:"Who invented the Pascaline calculator?", options:["Newton","Charles Babbage","Ada","Blaise Pascal"], answer:3},
{q:"Who is known as the Father of Computers?", options:["Charles Babbage","Pascal","Ada","Hollerith"], answer:0},
{q:"Who introduced the concept of the binary system in computing?", options:["Ada Lovelace","Pascal","Charles Babbage","Newton"], answer:0},
{q:"What machine was invented by Herman Hollerith?", options:["Abacus","Tabulating Machine","Laptop","IC"], answer:1},
{q:"Which technology was used in second-generation computers?", options:["Transistors","Vacuum tubes","IC","AI"], answer:0},
{q:"Which technology was used in third-generation computers?", options:["Integrated Circuits","Vacuum tubes","AI","Wire"], answer:0},
{q:"What does IC stand for?", options:["Integrated Circuit","Internal Code","Input Circuit","None"], answer:0},
{q:"What mechanism was used in the Pascaline machine?", options:["Wheels","Beads","Cards","AI"], answer:0},
{q:"Which machine used punched cards for data processing?", options:["Hollerith Machine","Abacus","IC","AI"], answer:0},
{q:"Who developed the Analytical Engine?", options:["Pascal","Ada","Babbage","Newton"], answer:2}
],

hard: [
{q:"Which component was used in first-generation computers?", options:["Vacuum tubes","IC","AI","Transistors"], answer:0},
{q:"Which technology is used in fourth-generation computers?", options:["VLSI","IC","Vacuum tubes","Wire"], answer:0},
{q:"Fifth-generation computers are mainly based on which technology?", options:["Artificial Intelligence","IC","Transistor","Vacuum tubes"], answer:0},
{q:"What does ULSI stand for?", options:["Ultra Large Scale Integration","Ultra Light System Integration","None","Low Scale Integration"], answer:0},
{q:"What does parallel processing mean?", options:["Performing multiple tasks at the same time","Performing a single task","No processing","Slow processing"], answer:0},
{q:"ENIAC belongs to which generation of computers?", options:["First generation","Second generation","Third generation","Fourth generation"], answer:0},
{q:"Which technology is used in microprocessors?", options:["VLSI","SSI","MSI","None"], answer:0},
{q:"What do vacuum tubes produce during operation?", options:["Cold","Sound","Light","Heat"], answer:3},
{q:"What ability do AI-based computers have?", options:["Thinking and decision-making","Sleeping","Eating","Walking"], answer:0},
{q:"How many generations of computers are there?", options:["Four","Five","Three","Two"], answer:1}
]

};

let questions=[], index=0, score=0, time=10, timer;

// Volume
document.getElementById("volume").oninput=(e)=>{
document.getElementById("correctSound").volume=e.target.value;
document.getElementById("wrongSound").volume=e.target.value;
};

// Start
function startGame(){
index=0;
score=0;

document.getElementById("startScreen").style.display="none";
document.getElementById("quizBox").style.display="block";

let level=document.getElementById("level").value;
let shuffled=[...allQuestions[level]].sort(()=>Math.random()-0.5);
questions=shuffled.slice(0,10);

loadQuestion();
}

// Timer
function startTimer(){
time=10;
document.getElementById("timer").innerText="⏱️ "+time;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱️ "+time;
if(time<=0){ clearInterval(timer); nextQuestion(); }
},1000);
}

// Load Question
function loadQuestion(){
if(index>=questions.length){ endQuiz(); return; }

clearInterval(timer);
startTimer();

document.getElementById("progress").innerText="Q "+(index+1)+"/10";

let q=questions[index];
document.getElementById("question").innerText=q.q;

let optEl=document.getElementById("options");
optEl.innerHTML="";

q.options.forEach((opt,i)=>{
let btn=document.createElement("button");
btn.innerText=opt;
btn.onclick=()=>checkAnswer(i);
optEl.appendChild(btn);
});
}

// Check
function checkAnswer(i){
clearInterval(timer);

if(i===questions[index].answer){
score++;
document.getElementById("correctSound").play();
confetti();
}else{
document.getElementById("wrongSound").play();
}

nextQuestion();
}

// Next
function nextQuestion(){
index++;
setTimeout(loadQuestion,600);
}

// End
function endQuiz(){
document.getElementById("question").innerText="🎉 Finished!";
document.getElementById("options").innerHTML="";
document.getElementById("score").innerText="Score: "+score+"/10";
document.getElementById("restartBtn").style.display="block";
}

// Restart
function restartQuiz(){
location.reload();
}

// Confetti
function confetti(){
let c=document.getElementById("confetti");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

for(let i=0;i<150;i++){
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(Math.random()*c.width,Math.random()*c.height,6,6);
}
setTimeout(()=>ctx.clearRect(0,0,c.width,c.height),500);
}

</script>

</body>
</html>
