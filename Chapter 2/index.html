<!DOCTYPE html>
<html>
<head>
    <title>Number System Drag & Drop Game</title>

    <!-- Responsive Meta Tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f0f8ff;
            margin: 0;
            padding: 10px;
        }

        h1 {
            color: #333;
            font-size: 22px;
        }

        #gameArea {
            display: none;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 20px;
        }

        .items, .targets {
            width: 45%;
            max-width: 400px;
        }

        .draggable {
            padding: 12px;
            margin: 10px 0;
            background: #4CAF50;
            color: white;
            cursor: grab;
            border-radius: 8px;
            font-size: 16px;
        }

        .dropzone {
            padding: 15px;
            margin: 10px 0;
            background: #ddd;
            border: 2px dashed #555;
            border-radius: 8px;
            font-size: 16px;
        }

        #scoreBoard {
            font-size: 18px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #2196F3;
            color: white;
        }

        button:hover {
            background: #1976D2;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* 📱 Mobile View */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .items, .targets {
                width: 90%;
            }

            h1 {
                font-size: 18px;
            }

            .draggable, .dropzone {
                font-size: 15px;
                padding: 14px;
            }
        }

        /* 📱 Small Mobile */
        @media (max-width: 480px) {
            h1 {
                font-size: 16px;
            }

            button {
                width: 90%;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

<h1>Number System Match Game (Drag and Drop the Number System to their Respective base)</h1>

<button onclick="startGame()">Start Game</button>

<div id="gameArea">
    <div class="container">
        
        <!-- Draggable Items -->
        <div class="items"></div>

        <!-- Drop Targets -->
        <div class="targets"></div>

    </div>

    <div id="scoreBoard">Score: 0</div>
</div>

<div id="endScreen" style="display:none;">
    <h2 id="finalScore"></h2>
    <button onclick="restartGame()">Restart Game</button>
</div>

<!-- Sounds -->
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let score = 0;
let total = 4;

const itemsData = [
    { id: "decimal", name: "Decimal", base: "Base 10" },
    { id: "binary", name: "Binary", base: "Base 2" },
    { id: "octal", name: "Octal", base: "Base 8" },
    { id: "hex", name: "Hexadecimal", base: "Base 16" }
];

function startGame() {
    document.querySelector("button").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    loadGame();
}

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function loadGame() {
    const itemsContainer = document.querySelector(".items");
    const targetsContainer = document.querySelector(".targets");

    itemsContainer.innerHTML = "";
    targetsContainer.innerHTML = "";

    let shuffledItems = shuffle([...itemsData]);
    let shuffledTargets = shuffle([...itemsData]);

    shuffledItems.forEach(item => {
        let div = document.createElement("div");
        div.className = "draggable";
        div.draggable = true;
        div.id = item.id;
        div.innerText = item.name;

        div.addEventListener("dragstart", dragStart);
        itemsContainer.appendChild(div);
    });

    shuffledTargets.forEach(item => {
        let div = document.createElement("div");
        div.className = "dropzone";
        div.setAttribute("data-match", item.id);
        div.innerText = item.base;

        div.addEventListener("dragover", dragOver);
        div.addEventListener("drop", dropItem);
        targetsContainer.appendChild(div);
    });
}

function dragStart(e) {
    e.dataTransfer.setData("text", e.target.id);
}

function dragOver(e) {
    e.preventDefault();
}

function dropItem(e) {
    e.preventDefault();
    let draggedId = e.dataTransfer.getData("text");
    let match = e.target.getAttribute("data-match");

    if (draggedId === match) {
        e.target.style.background = "#8BC34A";
        e.target.innerHTML += " ✔";
        document.getElementById(draggedId).style.display = "none";
        score++;

        document.getElementById("correctSound").play();

        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
        });

    } else {
        document.getElementById("wrongSound").play();
    }

    document.getElementById("scoreBoard").innerHTML = "Score: " + score;

    if (score === total) {
        endGame();
    }
}

function endGame() {
    document.getElementById("gameArea").style.display = "none";
    document.getElementById("endScreen").style.display = "block";
    document.getElementById("finalScore").innerHTML = "🎉 Your Score: " + score + " / " + total;
}

function restartGame() {
    location.reload();
}
</script>

</body>
</html>
